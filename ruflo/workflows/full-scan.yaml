name: full-scan
version: "1.0.0"
description: Scan OSINT complet d'un contact professionnel (Steps 0-11)

stages:
  - name: resolution
    description: "Steps 0-2: Pappers + Domaine + MX"
    strategy: sequential
    # Pas d'agent Ruflo — code pipeline classique (dependances sequentielles)

  - name: discovery
    description: "Steps 3-7: APIs + Web en PARALLELE"
    agents:
      - api-finder     # Hunter + Snov + Apollo (Step 3)
      - web-scanner    # Jina search + read + extract (Steps 6-7)
    strategy: parallel
    timeout: 60000

  - name: enrichment
    description: "Steps 8-9: Predictions + Verification"
    agents:
      - verifier
    strategy: sequential
    depends_on:
      - discovery

  - name: scoring
    description: "Steps 10-11: Scoring + Resultats"
    agents:
      - scorer
    strategy: sequential
    depends_on:
      - enrichment
