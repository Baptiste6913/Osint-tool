name: verify-only
version: "1.0.0"
description: Verification seule - prend des emails en input, verifie et score

stages:
  - name: verification
    description: "Step 9: Verification SMTP des emails fournis"
    agents:
      - verifier
    strategy: sequential
    timeout: 30000

  - name: scoring
    description: "Steps 10-11: Scoring + Resultats"
    agents:
      - scorer
    strategy: sequential
    depends_on:
      - verification
