name: quick-scan
version: "1.0.0"
description: Scan rapide sans web scraping (Steps 0-3 + 9-11)

stages:
  - name: resolution
    description: "Steps 0-2: Pappers + Domaine + MX"
    strategy: sequential

  - name: api-discovery
    description: "Step 3: APIs email finder uniquement"
    agents:
      - api-finder
    strategy: sequential
    timeout: 20000

  - name: verification
    description: "Step 9: Verification SMTP"
    agents:
      - verifier
    strategy: sequential
    depends_on:
      - api-discovery

  - name: scoring
    description: "Steps 10-11: Scoring + Resultats"
    agents:
      - scorer
    strategy: sequential
    depends_on:
      - verification
